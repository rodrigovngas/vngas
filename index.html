<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VNGAS | Desarrollo y Sistemas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

<!-- ICONOS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior:smooth; }

body {
  background:#020617;
  color:#E2E8F0;
  font-family:'Inter', sans-serif;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:0 24px;
}

/* NAV */
.nav {
  position:sticky;
  top:0;
  background:rgba(2,6,23,0.85);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:space-between;
  padding:20px 24px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.nav-links a {
  color:#94A3B8;
  margin-left:20px;
  text-decoration:none;
}
.nav-links a:hover { color:#22C55E; }

/* HERO */
.hero {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.hero h1 {
  font-size:clamp(2.5rem,5vw,4rem);
}

.hero p { color:#94A3B8; margin-top:10px; }

/* TERMINAL */
.terminal {
  margin-top:40px;
  font-family:'JetBrains Mono', monospace;
  color:#22C55E;
  background:rgba(15,23,42,0.6);
  padding:24px;
  border-radius:8px;
}

/* BOTONES */
.buttons {
  margin-top:40px;
  display:flex;
  gap:16px;
}

.btn {
  padding:14px 28px;
  border-radius:6px;
  text-decoration:none;
}

.primary {
  background:#22C55E;
  color:#020617;
}

.secondary {
  border:1px solid rgba(255,255,255,0.2);
  color:#fff;
}

/* SECCIONES */
.section { padding:100px 0; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card {
  background:rgba(15,23,42,0.4);
  padding:24px;
  border-radius:12px;
  transition:.3s;
}
.card:hover {
  transform:translateY(-5px);
  border:1px solid #22C55E;
}

/* CONTACTO */
.contact-box {
  background:rgba(34,197,94,0.05);
  border:1px dashed rgba(34,197,94,0.3);
  padding:40px;
  border-radius:12px;
  text-align:center;
}

/* ICONOS CONTACTO */
.contact-icons {
  margin-top:25px;
  display:flex;
  justify-content:center;
  gap:20px;
}

.contact-icons a {
  position:relative;
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(15,23,42,0.9);
  border:1px solid rgba(255,255,255,0.1);
  color:#22C55E;
  font-size:1.4rem;
  transition:.3s;
}

/* Glow effect */
.contact-icons a:hover {
  transform:translateY(-4px) scale(1.05);
  box-shadow:0 0 15px rgba(34,197,94,0.6);
  background:rgba(34,197,94,0.1);
}

/* Tooltip */
.contact-icons a::after {
  content:attr(data-tooltip);
  position:absolute;
  bottom:-35px;
  background:#020617;
  padding:5px 10px;
  font-size:.75rem;
  border-radius:5px;
  opacity:0;
  transition:.3s;
}

.contact-icons a:hover::after {
  opacity:1;
}

/* WHATSAPP FLOTANTE */
.whatsapp-float {
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#22C55E;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#020617;
  font-size:1.8rem;
  box-shadow:0 0 20px rgba(34,197,94,0.6);
  z-index:999;
  transition:.3s;
}

.whatsapp-float:hover {
  transform:scale(1.1);
}

/* FOOTER */
footer {
  text-align:center;
  padding:30px;
  color:#64748B;
}
</style>
</head>

<body>

<nav class="nav">
  <div>VNGAS</div>
  <div class="nav-links">
    <a href="#servicios">Servicios</a>
    <a href="#proyectos">Proyectos</a>
    <a href="#contacto">Contacto</a>
  </div>
</nav>

<section class="container hero">
  <h1>VNGAS</h1>
  <p>Desarrollo seguro. Sistemas eficientes y escalables.</p>

  <div class="terminal">
    $ system ready...
  </div>

  <div class="buttons">
    <a href="#proyectos" class="btn primary">Ver proyectos</a>
  </div>
</section>

<section class="container section" id="servicios">
  <h2>Servicios</h2>
  <div class="grid">
    <div class="card">Desarrollo de sistemas</div>
    <div class="card">APIs y backend</div>
    <div class="card">Optimización</div>
  </div>
</section>

<section class="container section" id="proyectos">
  <h2>Proyectos</h2>
  <div class="grid">
    <div class="card">Sistema empresarial</div>
    <div class="card">Backend Node.js</div>
  </div>
</section>

<section class="container section" id="contacto">
  <h2>Contacto</h2>
  <div class="contact-box">
    <p>¿Tienes un proyecto en mente?</p>

    <div class="contact-icons">
      <a href="mailto:tuemail@correo.com" data-tooltip="Enviar correo">
        <i class="fa-solid fa-envelope"></i>
      </a>

      <a href="https://wa.me/521XXXXXXXXXX" target="_blank" data-tooltip="WhatsApp">
        <i class="fa-brands fa-whatsapp"></i>
      </a>
    </div>
  </div>
</section>

<!-- BOTÓN FLOTANTE -->
<a href="https://wa.me/521XXXXXXXXXX" target="_blank" class="whatsapp-float">
  <i class="fa-brands fa-whatsapp"></i>
</a>

<footer>
  © 2026 VNGAS
</footer>

</body>
</html>
